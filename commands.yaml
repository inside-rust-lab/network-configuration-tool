cisco:
  pre_check:
    - show ip route
  configuration:
    - interface loopback 0
    - ip address 3.3.3.3 255.255.255.255
    - no shutdown
    - exit
    - router ospf 1
    - passive-interface default
    - no passive-interface gi 2/0/48
    - network 192.168.10.0 0.0.0.255 area 0
    - network 192.168.20.0 0.0.0.255 area 0
    - network 192.168.254.0 0.0.0.3 area 0
    - network 3.3.3.3 0.0.0.0 area 0
  post_check:
    - write memory
  
adtran:
  pre_check:
    - show ip route
  configuration:
    - interface loopback 1
    - ip address 2.2.2.2 255.255.255.255
    - no shutdown
    - exit
    - router ospf 1
    - network 10.0.0.0 0.0.0.3 area 0
    - network 192.168.254.0 0.0.0.3 area 0
    - network 2.2.2.2 0.0.0.0 area 0
  post_check:
    - write memory

juniper:
  pre_check:
    - show route
    - show ospf neighbor

  configuration:
    - set interfaces ge-0/0/0 unit 0 family inet dhcp
    - set interfaces lo0 unit 0 family inet address 1.1.1.1/32
    - set protocols ospf area 0 interface lo0.0 passive
    - set protocols ospf area 0 interface ge-0/0/1.0
    - set routing-options static route 0.0.0.0/0 next-hop 192.168.0.1
    - set policy-options policy-statement EXPORT-DEFAULT term 1 from route-filter 0.0.0.0/0 exact
    - set policy-options policy-statement EXPORT-DEFAULT term 1 then accept
    - set policy-options policy-statement EXPORT-DEFAULT term 2 then reject
    - set protocols ospf export EXPORT-DEFAULT
    - set security nat source rule-set trust-to-untrust from zone trust
    - set security nat source rule-set trust-to-untrust to zone untrust
    - set security nat source rule-set trust-to-untrust rule nat-out match source-address 0.0.0.0/0
    - set security nat source rule-set trust-to-untrust rule nat-out then source-nat interface
    - set security policies from-zone trust to-zone untrust policy trust-to-untrust match source-address any
    - set security policies from-zone trust to-zone untrust policy trust-to-untrust match destination-address any
    - set security policies from-zone trust to-zone untrust policy trust-to-untrust match application any
    - set security policies from-zone trust to-zone untrust policy trust-to-untrust then permit
    - set security policies from-zone untrust to-zone trust policy dhcp-to-trust match source-address any
    - set security policies from-zone untrust to-zone trust policy dhcp-to-trust match destination-address any
    - set security policies from-zone untrust to-zone trust policy dhcp-to-trust then permit
    - set secutiy zone trust host-inbound-traffic protocols all
    - set secutiy zone trust host-inbound-traffic system-services any-service
    - commit
  post_check: []